name: Deploy to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 수동 실행 버튼

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. 프로젝트 폴더로 이동
            cd /home/ubuntu/EchoMind
            
            # 2. 최신 코드 불러오기
            git pull origin main
            
            # 3. 가상환경 활성화 및 의존성 확인
            source venv/bin/activate
            pip install -r requirements.txt
            
            # 4. 사전 상태 진단 (Health Check)
            if ! python health_check.py; then
                echo "Health Check Failed. Deployment aborted!"
                exit 1
            fi
            
            # 5. DB 마이그레이션 (실패 시 배포 중단, 기존 서버 유지)
            echo "=== Running DB Migration ==="
            MIGRATION_OUTPUT=$(venv/bin/flask db upgrade 2>&1)
            MIGRATION_EXIT=$?
            echo "$MIGRATION_OUTPUT"
            
            if [ $MIGRATION_EXIT -ne 0 ]; then
                echo ""
                echo "=========================================="
                echo " MIGRATION FAILED (exit code: $MIGRATION_EXIT)"
                echo " 기존 서버를 유지합니다."
                echo "=========================================="
                exit 1
            fi
            echo "=== Migration completed successfully ==="
            
            # 6. 모든 단계 성공 시에만 Gunicorn 서버 재시작
            pkill -9 gunicorn || true
            sleep 2
            venv/bin/gunicorn -b 0.0.0.0:5000 --timeout 120 app:app --daemon
