{% extends "base.html" %}

{% block title %}분석 결과{% endblock %}

{% block content %}
<!-- Display the embedded report content generated by visualize_profile.py -->
{{ report_content | safe }}

<!-- Action Buttons -->
<div class="flex flex-col items-center gap-6 py-10">
    {% if g.user %}
    <div class="flex flex-wrap justify-center gap-4">
        <a href="{{ url_for('start_matching') }}"
            class="px-8 py-3 border border-transparent text-base font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 shadow-lg transition-colors">
            나와 맞는 친구 찾기
        </a>
    {% else %}
    <div class="glass-panel p-6 rounded-2xl border border-indigo-100 dark:border-indigo-900/30 bg-indigo-50/50 dark:bg-indigo-950/20 max-w-2xl w-full text-center mb-4">
        <h3 class="text-lg font-bold text-indigo-900 dark:text-indigo-300 mb-2">분석 결과를 영구히 저장하고 매칭을 시작해볼까요?</h3>
        <p class="text-sm text-slate-600 dark:text-slate-400 mb-4">회원가입을 하시면 이 결과가 계정에 자동 귀속되며, 나에게 딱 맞는 소울메이트를 추천받을 수 있습니다.</p>
        <div class="flex flex-wrap justify-center gap-3">
            <a href="{{ url_for('register') }}"
                class="px-6 py-2 border border-transparent text-sm font-bold rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 shadow-md transition-colors">
                회원가입하고 매칭하기
            </a>
            <a href="{{ url_for('login') }}"
                class="px-6 py-2 border border-slate-300 dark:border-slate-700 text-sm font-medium rounded-xl text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-800 hover:bg-slate-50 transition-colors">
                로그인
            </a>
        </div>
    </div>
    <div class="flex flex-wrap justify-center gap-4">
    {% endif %}
        <a href="{{ url_for('download_result_json') }}"
            class="px-8 py-3 border border-slate-300 dark:border-slate-600 text-base font-medium rounded-md text-slate-700 dark:text-slate-200 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 shadow-lg transition-colors">
            JSON 다운로드
        </a>
    </div>
</div>
{% endblock %}
